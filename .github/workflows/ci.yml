name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  list-packages:
    name: Discover packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.find.outputs.packages }}

    steps:
      - uses: actions/checkout@v4

      - name: Find scaffolded packages
        id: find
        run: |
          packages=$(find packages -maxdepth 1 -mindepth 1 -type d \
            -exec basename {} \; | sort | jq -R . | jq -sc .)
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

  ci:
    name: ${{ matrix.package }}
    needs: list-packages
    if: needs.list-packages.outputs.packages != '[]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.list-packages.outputs.packages) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install package and dependencies
        run: uv sync --package ${{ matrix.package }}

      - name: Lint (ruff check)
        run: uv run --package ${{ matrix.package }} ruff check packages/${{ matrix.package }}/

      - name: Format check (ruff format)
        run: uv run --package ${{ matrix.package }} ruff format --check packages/${{ matrix.package }}/

      - name: Test
        run: uv run --package ${{ matrix.package }} pytest packages/${{ matrix.package }}/tests/ -v
