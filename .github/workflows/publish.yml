name: Publish

on:
  push:
    tags:
      - "litprism-*/v*"   # e.g. litprism-pubmed/v0.1.0

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Derive package name from tag
        id: pkg
        run: |
          # Tag format: litprism-pubmed/v0.1.0  →  package = litprism-pubmed
          echo "name=$(echo '${{ github.ref_name }}' | cut -d'/' -f1)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: uv build --package ${{ steps.pkg.outputs.name }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
