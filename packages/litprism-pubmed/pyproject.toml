[project]
name = "litprism-pubmed"
version = "0.1.0"
description = "PubMed / MEDLINE search client for LitPrism"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
    "tenacity>=8.0",
]

[project.urls]
Homepage = "https://litprism.org"
Repository = "https://github.com/litprism-oss/litprism"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/litprism"]
